title: Preludens
tagline: Find the Game
description: >-
  Preludens bereidt teams voor op de toekomst met storytelling,
  MicroGames en interactieve leerervaringen.
url: "https://preludens.github.io"
baseurl: "/preludens-website"
lang: nl
email: info@preludens.nl

languages: ["nl", "en"]
default_lang: "nl"
exclude_from_localization:
  - assets
  - sitemap.xml
  - CNAME
  - .gitignore
  - .github
  - .cursor
lang_from_path: true
parallel_localization: true

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

sass:
  style: compressed
  sourcemap: never

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
  - node_modules

plugins:
  - jekyll-polyglot
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections:
  verhalen:
    output: true
    permalink: /verhalen/:name/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "verhalen"
    values:
      layout: verhaal

social:
  email: info@preludens.nl
