title: Preludens
tagline: Find the Game
description: >-
  Preludens bereidt teams voor op de toekomst met storytelling,
  MicroGames en interactieve leerervaringen.
url: "https://preludens.github.io"
baseurl: "/preludens-website"
# Canoniek productie-domein (via CNAME). Gebruikt voor structured data, og:image
# en robots/sitemap, zodat AI-engines en social previews het juiste domein zien.
prod_url: "https://preludens.nl"
lang: nl
email: info@preludens.nl
logo: /assets/images/logo/preludens-logo.png

languages: ["nl", "en"]
default_lang: "nl"
exclude_from_localization:
  - assets
  - admin
  - cloudflare
  - sitemap.xml
  - CNAME
  - .gitignore
  - .github
  - .cursor
lang_from_path: true
parallel_localization: true

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

sass:
  style: compressed
  sourcemap: never

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
  - node_modules
  - cloudflare

plugins:
  - jekyll-polyglot
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections:
  verhalen:
    output: true
    permalink: /verhalen/:name/
  play_blog:
    output: true
    permalink: /play/blog/:name/

defaults:
  - scope:
      path: ""
    values:
      image: https://preludens.nl/assets/images/og/preludens-og.jpg
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "verhalen"
    values:
      layout: verhaal
  - scope:
      path: ""
      type: "play_blog"
    values:
      layout: play-blog

social:
  email: info@preludens.nl
